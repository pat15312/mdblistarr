name: CI
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_ALLOWED_HOSTS: mdblistarr,localhost,127.0.0.1,testserver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: sudo mkdir -p /usr/src/db
      - run: sudo chown "$USER":"$USER" /usr/src/db
      - run: python mdblistarr/manage.py makemigrations --check --dry-run
      - run: python mdblistarr/manage.py migrate --noinput
      - run: python mdblistarr/manage.py migrate --check
      - run: python mdblistarr/manage.py check
      - run: python mdblistarr/manage.py check --deploy --fail-level ERROR
        env:
          SESSION_COOKIE_SECURE: "1"
          CSRF_COOKIE_SECURE: "1"
      - run: python mdblistarr/manage.py test mdblistrr
      - run: docker build -t mdblistarr:ci .
      - name: Fresh-volume Docker smoke test
        run: |
          set -euo pipefail
          volume="mdblistarr-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          c1="mdblistarr-ci-1-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          c2="mdblistarr-ci-2-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() { docker rm -f "$c1" "$c2" >/dev/null 2>&1 || true; docker volume rm "$volume" >/dev/null 2>&1 || true; }
          wait_health() {
            local name="$1"
            for i in {1..60}; do
              if curl -fsS http://127.0.0.1:5353/healthz >/dev/null; then return 0; fi
              sleep 2
            done
            echo "Container $name did not become healthy" >&2
            docker logs "$name" >&2 || true
            return 1
          }
          assert_logs_do_not_contain() {
            local name="$1" value="$2"
            if docker logs "$name" 2>&1 | grep -F -- "$value" >/dev/null; then
              echo "Container logs unexpectedly contained a generated secret" >&2
              return 1
            fi
          }
          trap cleanup EXIT
          docker volume create "$volume"
          docker run -d --name "$c1" -p 5353:5353 -e DJANGO_ALLOWED_HOSTS=mdblistarr,localhost,127.0.0.1,testserver -v "$volume":/usr/src/db mdblistarr:ci
          wait_health "$c1"
          curl -fsS http://127.0.0.1:5353/setup/ >/tmp/setup.html
          docker exec "$c1" test -s /usr/src/db/secrets/django_secret_key
          docker exec "$c1" test -s /usr/src/db/secrets/mdblistarr_encryption_key
          docker exec "$c1" sh -c "test \$(stat -c %a /usr/src/db/secrets) = 700"
          docker exec "$c1" sh -c "test \$(stat -c %a /usr/src/db/secrets/django_secret_key) = 600"
          docker exec "$c1" sh -c "test \$(stat -c %a /usr/src/db/secrets/mdblistarr_encryption_key) = 600"
          django_hash=$(docker exec "$c1" sha256sum /usr/src/db/secrets/django_secret_key | awk '{print $1}')
          fernet_hash=$(docker exec "$c1" sha256sum /usr/src/db/secrets/mdblistarr_encryption_key | awk '{print $1}')
          django_value=$(docker exec "$c1" cat /usr/src/db/secrets/django_secret_key)
          fernet_value=$(docker exec "$c1" cat /usr/src/db/secrets/mdblistarr_encryption_key)
          assert_logs_do_not_contain "$c1" "$django_value"
          assert_logs_do_not_contain "$c1" "$fernet_value"
          docker rm -f "$c1"
          docker run -d --name "$c2" -p 5353:5353 -e DJANGO_ALLOWED_HOSTS=mdblistarr,localhost,127.0.0.1,testserver -v "$volume":/usr/src/db mdblistarr:ci
          wait_health "$c2"
          curl -fsS http://127.0.0.1:5353/setup/ >/tmp/setup2.html
          test "$(docker exec "$c2" sha256sum /usr/src/db/secrets/django_secret_key | awk '{print $1}')" = "$django_hash"
          test "$(docker exec "$c2" sha256sum /usr/src/db/secrets/mdblistarr_encryption_key | awk '{print $1}')" = "$fernet_hash"
          assert_logs_do_not_contain "$c2" "$django_value"
          assert_logs_do_not_contain "$c2" "$fernet_value"

  publish:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/pat15312/mdblistarr
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
