name: CI
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-django-secret-key-not-for-production
      MDBLISTARR_ENCRYPTION_KEY: 8GZIXAVtd06FNR3woMMfkavlX1rB1NhfRnm22RgYV1Q=
      DJANGO_ALLOWED_HOSTS: mdblistarr,localhost,127.0.0.1,testserver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python mdblistarr/manage.py makemigrations --check --dry-run
      - run: python mdblistarr/manage.py migrate --check
      - run: python mdblistarr/manage.py check
      - run: python mdblistarr/manage.py check --deploy --fail-level ERROR
        env:
          DJANGO_SECRET_KEY: ci-django-secret-key-not-for-production
          MDBLISTARR_ENCRYPTION_KEY: 8GZIXAVtd06FNR3woMMfkavlX1rB1NhfRnm22RgYV1Q=
          DJANGO_ALLOWED_HOSTS: mdblistarr,localhost,127.0.0.1,testserver
          SESSION_COOKIE_SECURE: "1"
          CSRF_COOKIE_SECURE: "1"
      - run: python mdblistarr/manage.py test mdblistrr
      - run: docker build -t mdblistarr:ci .

  publish:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/pat15312/mdblistarr
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
